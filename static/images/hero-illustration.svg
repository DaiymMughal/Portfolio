<!-- Placeholder SVG for hero illustration -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circles -->
  <circle cx="400" cy="300" r="200" fill="url(#grad1)" opacity="0.1"/>
  <circle cx="400" cy="300" r="150" fill="url(#grad1)" opacity="0.2"/>
  
  <!-- Laptop illustration -->
  <rect x="200" y="200" width="400" height="250" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="3"/>
  <rect x="210" y="210" width="380" height="200" rx="5" fill="#0f172a"/>
  
  <!-- Code lines -->
  <line x1="230" y1="240" x2="350" y2="240" stroke="#6366f1" stroke-width="3" opacity="0.8"/>
  <line x1="230" y1="260" x2="450" y2="260" stroke="#8b5cf6" stroke-width="3" opacity="0.8"/>
  <line x1="230" y1="280" x2="380" y2="280" stroke="#6366f1" stroke-width="3" opacity="0.8"/>
  <line x1="230" y1="300" x2="500" y2="300" stroke="#ec4899" stroke-width="3" opacity="0.8"/>
  <line x1="230" y1="320" x2="420" y2="320" stroke="#8b5cf6" stroke-width="3" opacity="0.8"/>
  <line x1="230" y1="340" x2="340" y2="340" stroke="#6366f1" stroke-width="3" opacity="0.8"/>
  <line x1="230" y1="360" x2="480" y2="360" stroke="#8b5cf6" stroke-width="3" opacity="0.8"/>
  <line x1="230" y1="380" x2="360" y2="380" stroke="#6366f1" stroke-width="3" opacity="0.8"/>
  
  <!-- Laptop base -->
  <polygon points="180,450 620,450 600,470 200,470" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  
  <!-- Floating elements -->
  <circle cx="650" cy="150" r="30" fill="#6366f1" opacity="0.6"/>
  <circle cx="150" cy="100" r="20" fill="#8b5cf6" opacity="0.6"/>
  <circle cx="700" cy="400" r="25" fill="#ec4899" opacity="0.6"/>
  
  <!-- AI/ML symbols -->
  <text x="550" y="270" font-family="Arial" font-size="60" fill="#6366f1" opacity="0.3">&lt;/&gt;</text>
  <text x="100" y="500" font-family="Arial" font-size="40" fill="#8b5cf6" opacity="0.3">AI</text>
  <text x="650" y="520" font-family="Arial" font-size="40" fill="#ec4899" opacity="0.3">ML</text>
</svg>
